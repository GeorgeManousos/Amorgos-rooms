function checkFormValidation()
{
if( (document.getElementsByName("name")[0].value != "") && (document.getElementsByName("surname")[0].value != "") && (document.getElementsByName("email")[0].value != "") && (document.getElementsByName("phone")[0].value != "") && (String(document.getElementsByName("rooms")[0].value) != "") 
&& (String(document.getElementsByName("adults")[0].value) != "") && (String(document.getElementsByName("children")[0].value) != "") && (String(document.getElementsByName("arrival")[0].value) != "") && (String(document.getElementsByName("departure")[0].value) != "") && (document.getElementsByName("pet")[0].value != "") 
&& (document.getElementsByName("CaptchaInput")[0].value != "") )
{
if(verifyCode(document.getElementById("txtCaptcha").value, document.getElementsByName("CaptchaInput")[0].value) == true)
{
/* έλεγχος για Captcha */
if( (document.getElementsByName("name")[0].value.length >= 2) && (document.getElementsByName("surname")[0].value.length >= 2) && (document.getElementsByName("phone")[0].value.length >= 10) && 
(document.getElementsByName("phone")[0].value.length <= 15) )
{
if(isStringValid(document.getElementsByName("phone")[0].value) == true)
{
var currentDate = new Date();
var arrivalDate = new Date(String(document.getElementsByName("arrival")[0].value)); 
var departureDate = new Date(String(document.getElementsByName("departure")[0].value));
if( (arrivalDate > currentDate) && (departureDate > arrivalDate) )
{
var str_email = document.getElementsByName("email")[0].value;
var len_email = str_email.length;
if(str_email.slice(len_email-9, len_email) == "@yahoo.gr"){document.write("Η φόρμα υποβλήθηκε"); mailForwarding(str_email); return true;}
else if(str_email.slice(len_email-10, len_email) == "@gmail.com"){document.write("Η φόρμα υποβλήθηκε"); mailForwarding(str_email); return true;}
else{document.write("Μη έγκυρη διεύθυνση email"); return false;}
}
else{document.write("Λανθασμένες Ημερομηνίες"); return false;}
}
else{document.write("Ο αριθμός τηλεφώνου πρέπει να περιέχει μόνο ψηφία"); return false;}
}
else{document.write("Εσφαλμένο πλήθος χαρακτήρων: Παρακαλώ χρησιμοποιήστε τουλάχιστον 2 χαρακτήρες για το Όνομα/Επίθετο και 10 με 15 χαρακτήρες για το Τηλέφωνο"); return false;}
}
else{document.write("Λανθασμένο Captcha"); return false;}
}
else{document.write("Παρακαλώ συμπληρώστε όλα τα υποχρεωτικά πεδία"); return false;}
}

function verifyCode(givenCode, enteredCode) 
{
  return givenCode === enteredCode;
}


function isStringValid(str) 
{
    const regex = /^[1-9]+$/;
    return regex.test(str);
}


function mailForwarding(dest_email)
{
const nodemailer = require('nodemailer');

let transporter = nodemailer.createTransport({
    service: 'gmail',
    auth: {
        user: 'projecttime49@gmail.com',
        pass: 'PROJECT2009'
    }
});

let mailOptions = {
    from: 'projecttime49@gmail.com',
    to: dest_email,
    subject: 'Subject of the email',
    text: 'Message body'
};

transporter.sendMail(mailOptions, function(error, info){
    if (error) {
        console.log(error);
    } else {
        console.log('Email sent: ' + info.response);
    }
});
} 

</script>

<script type="text/javascript">

// Captcha Script

function checkform(theform){
var why = "";

if(theform.CaptchaInput.value == ""){
why += "- Please Enter CAPTCHA Code.\n";
}
if(theform.CaptchaInput.value != ""){
if(ValidCaptcha(theform.CaptchaInput.value) == false){
why += "- The CAPTCHA Code Does Not Match.\n";
}
}
if(why != ""){
alert(why);
return false;
}
}

var a = Math.ceil(Math.random() * 9)+ '';
var b = Math.ceil(Math.random() * 9)+ '';
var c = Math.ceil(Math.random() * 9)+ '';
var d = Math.ceil(Math.random() * 9)+ '';
var e = Math.ceil(Math.random() * 9)+ '';

var code = a + b + c + d + e;
document.getElementById("txtCaptcha").value = code;
document.getElementById("CaptchaDiv").innerHTML = code;

// Validate input against the generated number
function ValidCaptcha(){
var str1 = removeSpaces(document.getElementById('txtCaptcha').value);
var str2 = removeSpaces(document.getElementById('CaptchaInput').value);
if (str1 == str2){
return true;
}else{
return false;
}
}

// Remove the spaces from the entered and generated code
function removeSpaces(string){
return string.split(' ').join('');
}
